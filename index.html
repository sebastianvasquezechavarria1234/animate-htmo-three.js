<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Animate Home - 3D Viewer</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #1a1a2e; font-family: 'Segoe UI', sans-serif; color: #fff; }

    .hero {
      display: flex;
      height: 100vh;
    }

    .hero-3d {
      width: 55%;
      position: relative;
    }

    .hero-3d canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hero-text {
      width: 45%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 4rem 5rem;
    }

    .hero-text h1 {
      font-size: 3.2rem;
      line-height: 1.15;
      margin-bottom: 1.5rem;
      background: linear-gradient(135deg, #e0c3fc, #8ec5fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-text p {
      font-size: 1.15rem;
      color: #b0b0c8;
      line-height: 1.7;
      margin-bottom: 2.5rem;
    }

    .hero-text .cta {
      display: inline-block;
      padding: 0.9rem 2.5rem;
      background: linear-gradient(135deg, #8ec5fc, #e0c3fc);
      color: #1a1a2e;
      font-weight: 700;
      font-size: 1rem;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .hero-text .cta:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(142, 197, 252, 0.3);
    }

    #loading {
      position: fixed;
      top: 0; left: 0;
      width: 55%; height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #1a1a2e;
      color: #fff;
      font-size: 1.1rem;
      z-index: 10;
      transition: opacity 0.5s;
    }

    @media (max-width: 900px) {
      .hero { flex-direction: column; }
      .hero-3d, .hero-text { width: 100%; height: 50%; }
      .hero-text { padding: 2rem; align-items: center; text-align: center; }
      .hero-text h1 { font-size: 2rem; }
      #loading { width: 100%; height: 50%; }
    }
  </style>
</head>
<body>
  <section class="hero">
    <div class="hero-3d" id="viewer">
      <div id="loading">Cargando modelo 3D...</div>
    </div>
    <div class="hero-text">
      <h1>Arte que cobra vida en tu hogar</h1>
      <p>
        Descubre nuestras piezas decorativas, diseñadas para transformar cualquier espacio
        en una obra de arte. Cada pieza combina tecnología y creatividad para
        ofrecer una experiencia visual única.
      </p>
      <a href="#" class="cta">Explorar Colección</a>
    </div>
  </section>

  <script type="importmap">
    {
      "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.164.1/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.164.1/examples/jsm/"
      }
    }
  </script>
  <script type="module" src="js/main.js"></script>
</body>
</html>
